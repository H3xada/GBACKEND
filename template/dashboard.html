<!DOCTYPE html>
<html lang="en" style="background-color: rgba(0,0,0,0.0); width:100%; height: 100%;">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTPSX — Player Login</title>
  <link rel="icon" type="image/png"
    href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/images/growtopia.ico"
    sizes="16x16" />
  <link rel="shortcut icon"
    href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/images/growtopia.ico"
    type="image/x-icon">
  <link rel="icon"
    href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/images/growtopia.ico"
    type="image/x-icon">
  <link media="all" rel="stylesheet"
    href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/css/faq-main.css">
  <link media="all" rel="stylesheet"
    href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/css/shop-custom.css">
  <link media="all" rel="stylesheet"
    href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/css/ingame-custom.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --purple-deep:   #1a0a2e;
      --purple-mid:    #2d1155;
      --purple-accent: #7c3aed;
      --purple-light:  #a855f7;
      --purple-glow:   #c084fc;
      --gold:          #f0b429;
      --gold-dim:      #a07820;
      --text-primary:  #f0e6ff;
      --text-muted:    #9d7bc0;
      --border:        rgba(168, 85, 247, 0.25);
      --border-hover:  rgba(168, 85, 247, 0.6);
    }

    .modal-backdrop {
      background-color: rgba(0, 0, 0, 0.1) !important;
    }
    .modal-backdrop + div { overflow: auto; }
    .modal-body, .content { padding: 0; }

    /* ── Modal shell ── */
    #modalShow .modal-content {
      background: linear-gradient(155deg, #1e0a38 0%, #0f0520 60%, #1a0a2e 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow:
        0 0 0 1px rgba(168,85,247,0.15),
        0 8px 40px rgba(124,58,237,0.35),
        0 2px 8px rgba(0,0,0,0.8),
        inset 0 1px 0 rgba(168,85,247,0.2);
      overflow: hidden;
      position: relative;
    }

    /* subtle animated top-edge glow */
    #modalShow .modal-content::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--purple-glow), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    /* ── Section title ── */
    .section-title h2 {
      font-family: 'Cinzel', serif !important;
      font-weight: 700;
      font-size: 15px !important;
      letter-spacing: 0.06em;
      color: var(--text-primary) !important;
      margin-bottom: 4px !important;
      text-shadow: 0 0 20px rgba(168,85,247,0.5);
    }

    /* server badge — top of modal */
    .gtpsx-badge {
      text-align: center;
      padding: 12px 0 6px;
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.3em;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }
    .gtpsx-badge .gtps {
      color: #f0c040;
      text-shadow: 0 0 18px rgba(240,192,64,0.7), 0 0 40px rgba(240,192,64,0.2);
    }
    .gtpsx-badge .x {
      color: #4ade80;
      text-shadow: 0 0 18px rgba(74,222,128,0.7), 0 0 40px rgba(74,222,128,0.2);
    }

    /* ── Divider line under title ── */
    .section-title {
      padding-bottom: 4px;
      margin-bottom: 12px !important;
    }

    /* ── Inputs ── */
    .form-control.grow-text {
      font-family: 'Outfit', sans-serif !important;
      font-size: 13px !important;
      font-weight: 400;
      background: rgba(255,255,255,0.04) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      color: var(--text-primary) !important;
      padding: 8px 12px !important;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      caret-color: var(--purple-light);
    }
    .form-control.grow-text::placeholder {
      color: var(--text-muted) !important;
      font-weight: 300;
    }
    .form-control.grow-text:focus {
      background: rgba(124,58,237,0.08) !important;
      border-color: var(--border-hover) !important;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15), 0 0 12px rgba(124,58,237,0.1) !important;
      outline: none !important;
      color: #fff !important;
    }

    /* ── Submit button ── */
    .btn.grow-button {
      font-family: 'Cinzel', serif !important;
      font-size: 12px !important;
      font-weight: 600 !important;
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 50%, #4c1d95 100%) !important;
      border: 1px solid rgba(168,85,247,0.5) !important;
      border-radius: 8px !important;
      color: #fff !important;
      padding: 9px 24px !important;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
      box-shadow: 0 4px 15px rgba(124,58,237,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
      cursor: pointer;
    }
    .btn.grow-button::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transition: left 0.4s ease;
    }
    .btn.grow-button:hover::before { left: 160%; }
    .btn.grow-button:hover {
      filter: brightness(1.15);
      box-shadow: 0 6px 20px rgba(124,58,237,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }
    .btn.grow-button:active { transform: translateY(0px); filter: brightness(0.95); }
    .btn.grow-button:disabled {
      opacity: 0.6 !important;
      cursor: not-allowed;
      transform: none !important;
    }

    /* ── Links ── */
    .forgot-password a {
      font-family: 'Outfit', sans-serif !important;
      font-size: 11px !important;
      color: var(--text-muted) !important;
      text-decoration: none;
      transition: color 0.2s;
    }
    .forgot-password a:hover { color: var(--purple-glow) !important; }
    #guestLogin {
      font-family: 'Outfit', sans-serif !important;
      font-size: 11px !important;
      color: var(--gold-dim) !important;
      letter-spacing: 0.03em;
    }
    #guestLogin:hover { color: var(--gold) !important; }

    /* ── Container padding ── */
    #modalShow .modal-body .container { padding: 18px 20px 16px !important; }
    #modalShow .div-content-center { justify-content: center; }
    #modalShow .form-group { margin-bottom: 10px !important; }

    .hidden { display: none !important; }
  </style>
</head>

<body style="background-color: rgba(0,0,0,0.0);">
  <button type="button" class="btn btn-primary hidden" data-toggle="modal" id="modalButton" data-target="#modalShow"
    data-backdrop="static" data-keyboard="false"></button>
  <div class="content">
    <section class="common-box">
      <div class="container">
        <div class="row">
          <div class="col-md-12 col-sm-12">
            <div class="row">
              <div class="modal fade product-list-popup" id="modalShow" tabindex="-1" role="dialog" aria-hidden="false">
                <div class="modal-dialog modal-dialog-centered" role="document">
                  <div class="modal-content">
                    <div class="modal-body">
                      <div class="content">
                        <section class="common-box">
                          <div class="container">
                            <div class="gtpsx-badge"><span class="gtps">GTPS</span><span class="x">X</span></div>
                            <div class="section-title center-align">
                              <h2>Log in with your Grow ID</h2>
                            </div>
                            <div class="row div-content-center">
                              <div class="col-md-12 col-sm-12">

                                <form method="POST" id="loginForm" action="/player/growid/login/validate"
                                  accept-charset="UTF-8" class="" role="form" autocomplete="off">
                                  <input name="_token" type="hidden" value="{{ data }}">
                                  <div class="form-group">
                                    <input id="login-name" class="form-control grow-text" required="required"
                                      placeholder="Your Growtopia Name *" name="growId" value="" type="text"
                                      pattern="[A-Za-z0-9]+" title="Only letters and numbers are allowed">
                                  </div>
                                  <div class="form-group">
                                    <input id="password" class="form-control grow-text" required="required"
                                      placeholder="Your Growtopia Password *" name="password" type="password" value=""
                                      pattern="[A-Za-z0-9@._!\-]+"
                                      title="Only letters, numbers, and @ . _ ! - are allowed">
                                  </div>
                                  <div class="form-group text-center forgot-password">
                                    <a href="https://www.growtopiagame.com/account" target="_blank">Forgot Password</a>
                                    <br>
                                    <a href="#" id="guestLogin" style="margin-top: 5px; display: inline-block;">Play as Guest</a>
                                  </div>
                                  <div class="form-group text-center">
                                    <input class="btn btn-lg btn-primary grow-button" type="submit" value="Log in">
                                  </div>
                                </form>

                                <form method="POST" id="guestForm" action="/player/growid/login/validate"
                                  accept-charset="UTF-8" class="hidden" role="form" autocomplete="off">
                                  <input name="_token" type="hidden" value="{{ data }}">
                                  <input name="growId" type="hidden" value="">
                                  <input name="password" type="hidden" value="">
                                </form>

                              </div>
                            </div>
                          </div>
                        </section>
                      </div>

                      <script>
                        document.addEventListener('DOMContentLoaded', function () {
                          const loginForm = document.getElementById('loginForm');
                          const sectionTitle = document.querySelector('.section-title h2');

                          // guest login
                          const guestLoginLink = document.getElementById('guestLogin');
                          guestLoginLink.addEventListener('click', function (e) {
                            e.preventDefault();
                            document.getElementById('guestForm').submit();
                          });

                          // login form handlers
                          const loginSubmitButton = loginForm.querySelector('input[type="submit"]');
                          const loginNameInput = document.getElementById('login-name');
                          const passwordInput = document.getElementById('password');

                          loginNameInput.addEventListener('input', function (e) {
                            this.value = this.value.replace(/[^A-Za-z0-9]/g, '');
                          });
                          passwordInput.addEventListener('input', function (e) {
                            this.value = this.value.replace(/[^A-Za-z0-9@._!\-]/g, '');
                          });
                          loginForm.addEventListener('submit', function (e) {
                            if (loginSubmitButton.disabled) {
                              e.preventDefault();
                              return false;
                            }
                            loginSubmitButton.disabled = true;
                            loginSubmitButton.value = 'Logging in...';
                          });
                        });
                      </script>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</body>

<script src="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/js/jquery-3.7.1.min.js"></script>
<script src="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/js/bootstrap3.min.js"></script>
<script>
  let clicked = false;
  $("a").click(function () { if (clicked === false) { clicked = true; return true; } $(this).attr("onclick", "return false;"); });
  $('document').ready(function () {
    document.onkeydown = (e) => {
      if (e.key == 123) { e.preventDefault(); }
      if (e.key == 'F12') { e.preventDefault(); }
      if (e.ctrlKey && e.shiftKey && e.key == 'I') { e.preventDefault(); }
      if (e.ctrlKey && e.key == 'I') { e.preventDefault(); }
      if (e.ctrlKey && e.shiftKey && e.key == 'C') { e.preventDefault(); }
      if (e.ctrlKey && e.shiftKey && e.key == 'J') { e.preventDefault(); }
      if (e.ctrlKey && e.key == 'U') { e.preventDefault(); }
    };
    $('#modalButton').trigger('click');
    $('.close').on('click', function () {
      window.location = "https://login.growtopiagame.com/player/validate/close";
    });
    var observer = new MutationObserver(function (mutations) {
      mutations.forEach(function (mutation) {
        for (var i = 0; i < mutation.addedNodes.length; i++) {
          if (mutation.addedNodes[i].tagName == 'DIV') {
            var thediv = mutation.addedNodes[i];
            var sw = window.screen.width;
            if (sw < 667) {
              $(thediv).css({
                'transform': 'scale(0.75)',
                'transform-origin': '0 0',
                '-webkit-transform': 'scale(0.75)',
                '-webkit-transform-origin': '0 0',
                'overflow': 'auto'
              });
            }
          }
        }
      });
    });
    observer.observe(document.body, { attributes: false, childList: true, characterData: false });
  });
</script>

</html>
